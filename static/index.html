<!doctype html>
<html lang="en" data-theme="navy">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ledger</title>
    <link rel="stylesheet" href="styles.css?v=20260629-04" />
  </head>
  <body>
    <div class="app-shell">
      <main class="workspace">
        <header class="topbar">
          <nav class="nav-list" id="navList" aria-label="Main navigation"></nav>
          <div class="search-shell">
            <label class="search">
              <span class="search-icon" data-icon="search"></span>
              <input id="globalSearch" type="search" placeholder="Search anything..." />
              <kbd>/</kbd>
            </label>
            <div class="active-filter-chips" id="activeFilterChips" aria-label="Active table filters" hidden></div>
          </div>
          <div class="topbar-actions">
            <div class="font-scale-control" id="fontScaleControl" aria-label="Text size"></div>
            <div class="project-currency-control" id="projectCurrencyControl" aria-label="Project currency"></div>
            <div class="topbar-utility-control" id="topbarUtilityControl" aria-label="Theme, refresh, and privacy"></div>
            <div class="topbar-print-control" id="pagePrintControl" aria-label="Print current page"></div>
            <div class="period-control" id="periodControl" aria-label="Reporting period"></div>
          </div>
        </header>

        <section class="page-stage" id="pageStage" aria-live="polite"></section>
      </main>
    </div>

    <script type="module" src="app.js?v=20260629-04"></script>
  </body>
</html>
